upstream bench-frappe {
  server 127.0.0.1:8000 fail_timeout=0;
}

upstream bench-socketio-server {
  server 127.0.0.1:9000 fail_timeout=0;
}

server {
  # Catch-all default server: Railway's healthcheck sends Host:
  # healthcheck.railway.app (NOT the public domain), so a specific server_name
  # would miss it and fall through to the stock nginx default site -> 404 on
  # /api/method/ping -> healthcheck never passes. server_name _ + default_server
  # makes this block answer every Host; the single site is still resolved via the
  # pinned X-Frappe-Site-Name header below.
  listen 80 default_server;
  server_name _;
  root /home/frappe/frappe-bench/sites;

  location /assets {
    try_files $uri =404;
  }

  location ~ ^/protected/(.*) {
    internal;
    # Single-site deployment: resolve files against the known site directory
    # (RFP_DOMAIN_NAME), not the incoming Host header, which on Railway is the
    # generated *.up.railway.app domain and would never match.
    try_files /${RFP_DOMAIN_NAME}/$1 =404;
  }

  location /socket.io {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # Pin to the single site so any inbound domain resolves correctly.
    proxy_set_header X-Frappe-Site-Name ${RFP_DOMAIN_NAME};
    proxy_set_header Origin $scheme://$http_host;
    proxy_set_header Host $host;

    proxy_pass http://bench-socketio-server;
  }

  location / {
    try_files /${RFP_DOMAIN_NAME}/public/$uri @webserver;
  }

  location @webserver {
    proxy_set_header X-Robots-Tag noindex;

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Pin to the single site so the Railway domain (and any custom domain)
    # always maps to RFP_DOMAIN_NAME instead of returning "Site not found".
    proxy_set_header X-Frappe-Site-Name ${RFP_DOMAIN_NAME};
    proxy_set_header Host $host;
    proxy_set_header X-Use-X-Accel-Redirect True;
    proxy_read_timeout 120;
    proxy_redirect off;

    proxy_pass  http://bench-frappe;
  }

  # error pages
  error_page 502 /502.html;
  location /502.html {
    root /home/frappe/bench-repo/bench/config/templates;
    internal;
  }

  # optimizations
  sendfile on;
  keepalive_timeout 15;
  client_max_body_size 50m;
  client_body_buffer_size 16K;
  client_header_buffer_size 1k;

  # enable gzip compresion
  # based on https://mattstauffer.co/blog/enabling-gzip-on-nginx-servers-including-laravel-forge
  # text/html is always compressed by HttpGzipModule
  gzip on;
  gzip_http_version 1.1;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/rss+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/font-woff
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/svg+xml
    image/x-icon
    text/css
    text/plain
    text/x-component
    ;
}
